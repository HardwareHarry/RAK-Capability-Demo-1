; =============================================================================
; WisBlock Sensor Hub — PlatformIO Configuration
; Target: RAK3312 (ESP32-S3 + SX1262) on RAK19011 Base Board
; =============================================================================

[platformio]
default_envs = rak3112
description = WisBlock Sensor Hub with multi-sensor data collection, 
              web dashboard, LoRaWAN telemetry, and FRAM storage
boards_dir = rakwireless/boards

; --- Common settings shared across all environments -------------------------
[common]
framework = arduino
platform = platformio/espressif32
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    ; Sensor libraries
    adafruit/Adafruit BME680 Library@^2.0.4
    adafruit/Adafruit VEML7700 Library@^2.1.6
    adafruit/Adafruit PM25 AQI Sensor@^1.1.1
    sparkfun/SparkFun RV-3028-C7 Arduino Library@^1.2.6
    mikalhart/TinyGPSPlus@^1.1.0

    ; Storage
    ; FRAM uses raw SPI — no external library needed

    ; Networking
    me-no-dev/ESP Async WebServer@^1.2.4
    bblanchon/ArduinoJson@^7.2.1

    ; LoRaWAN
    mcci-catena/MCCI LoRaWAN LMIC library@^4.1.1

    ; Display — both included, selected at compile time
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit EPD@^4.5.5
    adafruit/Adafruit ILI9341@^1.6.1
    adafruit/Adafruit FT6206 Library@^1.1.0

    ; IO Expander
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

    ; --- Display selection (uncomment ONE) ---
    -DDISPLAY_EINK=1
    ; -DDISPLAY_TFT=1

    ; --- LoRaWAN Region (uncomment ONE) ---
    -DCFG_eu868=1
    ; -DCFG_us915=1
    ; -DCFG_au915=1
    ; -DCFG_as923=1

    ; --- LMIC configuration ---
    -DCFG_sx1262_radio=1
    -DLMIC_USE_INTERRUPTS=1
    -DHAL_ESP32=1

    ; --- Application configuration ---
    -DSENSOR_INTERVAL_MS=30000
    -DLORA_TX_INTERVAL_MS=300000
    -DDISPLAY_REFRESH_INTERVAL_MS=300000

; --- RAK3312 Build Environment ----------------------------------------------
[env:rak3112]
framework = ${common.framework}
platform = ${common.platform}
board = rak3112
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_deps = ${common.lib_deps}

build_flags =
    ${common.build_flags}
    -I rakwireless/variants/rak3112

; Partition table: 4MB app, 2MB LittleFS for web assets, rest for OTA
board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.psram_type = opi
board_build.extra_flags = -DBOARD_HAS_PSRAM
